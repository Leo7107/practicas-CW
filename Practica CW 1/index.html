<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Ejercicios practicos del DOM</title>
</head>
<body>
    <div class="tarjeta">
        <h3>Generador de saludos</h3>
        <input type="text" id="nombreUsuario" placeholder="Ingresa tu nombre">
        <button id="btnSaludar">Saludar</button>
        <p id="mensaje" style="color: cadetblue;"></p>
    </div>
    <div class="tarjeta">
        <h3>Ejercicio de Suscripcion</h3>
        <form id="formSuscripcion">
            <label for="correoUsuario">Correo Electrónico:</label>
            <input type="email" id="correoUsuario" placeholder="correoUsuario" required>
            <button type="submit">Suscribirme</button>
        </form>
        <p id="mensajeEnvio" style="color: rgb(70, 167, 40);"></p>
    </div>
    <script src="script.js"></script>
</body>
</html>
