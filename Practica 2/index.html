<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practica 2</title>
</head>
<body>
    <div id="app">
         <div class="tarjeta">
        <h3>Generador de saludo</h3>
        <input type="text" v-model="nombreUsuario" placeholder="Ingresa tu nombre">
        <button @click="saludar">Saludar</button>
        <p style="color: blue;">{{ mensaje }}</p>

    </div>
    <div class="tarjeta">
        <h3>Ejercicio de Suscripcion</h3>
        <form id="formSuscripcion">
            <label for="correoUsuario" >Correo Electrónico:</label>
            <input type="email" id="correoUsuario" placeholder="Ingresa tu correo electrónico">
            <button type="submit">Suscribirse</button>
        </form>
    </div>
    </div>

    <script>

    Vue.createApp({
        data() {
            return {
                nombreUsuario: '',
                mensaje: '',
            };
        },
        methods: {
            saludar() {
                if (this.nombreUsuario.trim() !== '') {
                    this.mensaje = `¡Hola, ${this.nombreUsuario}! Bienvenido al mundo del DOM con Vue.js.`;
                } else {
                    this.mensaje = 'Por favor, ingresa tu nombre para recibir un saludo.';
                }
            }
        }
    }).mount('#app');
    </script>
    
</body>

</html>
